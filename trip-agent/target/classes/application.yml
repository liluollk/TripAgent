spring:
  application:
    name: trip-agent
  autoconfigure:
    exclude: org.springframework.ai.model.deepseek.autoconfigure.DeepSeekChatAutoConfiguration
  http:
    client:
      timeout: 180s

  # DeepSeek Configuration
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:sk-1faadd1f31d54dc4a0736182c95afca2}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
    tools:
      enabled: true

    # MCP Client Configuration
    mcp:
      client:
        enabled: true
        name: trip-agent-client
        version: 1.0.0
        request-timeout: 120s
        type: SYNC
        streamable-http:
          connections:
            trip-tools:
              url: ${MCP_SERVER_URL:http://localhost:8081}

  # PostgreSQL Configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:trip_agent}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # JDBC Configuration for Chat Memory
  sql:
    init:
      mode: always

# Server Configuration
server:
  port: ${SERVER_PORT:8080}

# Logging Configuration
logging:
  level:
    org.springframework.ai: INFO
    com.tripagent: DEBUG

# Knife4j Configuration
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
    groups:
      enabled: true

knife4j:
  enable: true
  setting:
    language: zh_cn

# Custom Configuration
trip:
  weather:
    api-key: ${QWEATHER_API_KEY:49833bc033c84af6b640f53d548386ba}
    host: ${QWEATHER_HOST:km49vk34x2.re.qweatherapi.com}
    geo-host: ${QWEATHER_GEO_HOST:km49vk34x2.re.qweatherapi.com}
  amap:
    api-key: ${AMAP_API_KEY:8c97dbdfd69aaff4225a66bb92626a72}
  agent:
    planning:
      model: ${PLANNING_MODEL:deepseek-v4-pro}
      temperature: ${PLANNING_TEMPERATURE:0.7}
    execution:
      model: ${EXECUTION_MODEL:deepseek-v4-flash}
      temperature: ${EXECUTION_TEMPERATURE:0.3}
    memory:
      window-size: ${MEMORY_WINDOW_SIZE:20}
      compress-threshold: ${MEMORY_COMPRESS_THRESHOLD:20}
      keep-recent: ${MEMORY_KEEP_RECENT:10}
      compress-gap: ${MEMORY_COMPRESS_GAP:5}
      ai-extraction:
        enabled: ${AI_EXTRACTION_ENABLED:true}

spring:
  ai:
    deepseek:
      api-key: test-key
      base-url: https://api.deepseek.com
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: embedded

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop

trip:
  weather:
    api-key: test-key
  amap:
    api-key: test-key
  agent:
    planning:
      model: deepseek-v4-pro
      temperature: 0.7
    execution:
      model: deepseek-v4-flash
      temperature: 0.3
    memory:
      window-size: 20
      compress-threshold: 20
      keep-recent: 10
      compress-gap: 5
      ai-extraction:
        enabled: false

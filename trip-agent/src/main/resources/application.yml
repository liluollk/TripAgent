spring:
  application:
    name: trip-agent
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  autoconfigure:
    exclude: org.springframework.ai.model.deepseek.autoconfigure.DeepSeekChatAutoConfiguration
  http:
    client:
      timeout: 60s

  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
    tools:
      enabled: true

    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${QWEN_API_KEY}
      embedding:
        dimensions: 1024
        model: text-embedding-v4

    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024
        table-name: trip_knowledge_v2

    mcp:
      client:
        enabled: true
        name: trip-agent-client
        version: 1.0.0
        request-timeout: 60s
        type: SYNC
        stdio:
          connections:
            trip-tools:
              command: cmd.exe
              args:
                - /c
                - java
                - -jar
                - ../trip-tools-server/target/trip-tools-server-1.0.1.jar

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:trip_agent}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    org.springframework.ai: INFO
    com.tripagent: INFO

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
    groups:
      enabled: true

trip:
  weather:
    api-key: ${QWEATHER_API_KEY}
    host: ${QWEATHER_HOST}
    geo-host: ${QWEATHER_GEO_HOST}
  amap:
    api-key: ${AMAP_API_KEY}
  agent:
    planning:
      model: ${PLANNING_MODEL:deepseek-v4-pro}
      temperature: ${PLANNING_TEMPERATURE:0.7}
    execution:
      model: ${EXECUTION_MODEL:deepseek-v4-flash}
      temperature: ${EXECUTION_TEMPERATURE:0.3}
    memory:
      window-size: ${MEMORY_WINDOW_SIZE:20}
      compression-threshold: ${MEMORY_COMPRESSION_THRESHOLD:15}
  rag:
    enabled: true
    knowledge-file: classpath:knowledge/nanjing-local.md
